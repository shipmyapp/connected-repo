# Dev-only nginx config used by docker-compose.dev.yml. Mirrors the prod split
# (see apps/frontend/nginx.conf.template) so devs hit the same same-origin
# routes as prod: / → Vite dev server, /api/* → backend.
#
# HMR: Vite's websocket rides the same port; upgrade headers below let it
# tunnel through. `proxy_read_timeout 24h` prevents the WS from timing out.
#
# No envsubst — this file is copied verbatim into the container. Values that
# would vary in prod (SENTRY_INGEST_URL, etc.) are irrelevant in dev.

upstream backend_upstream {
    server backend:3000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:5173;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25m;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Everything under /api/* → backend, same as prod.
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # Vite dev server: SPA + HMR websocket. Upgrade/Connection headers are
    # required or the /@vite/client WS handshake fails and edits stop
    # hot-reloading.
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 24h;
    }
}
